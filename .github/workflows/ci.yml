name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - run: uv sync
      - name: Run tests
        run: uv run pytest -v

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - run: bun install
      - run: bun run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - run: bun install
      - run: bun run build
